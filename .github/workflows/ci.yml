name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Lint commit messages
        env:
          COMMITLINT_FROM: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          COMMITLINT_TO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: npx commitlint --config commitlint.config.mjs --from "$COMMITLINT_FROM" --to "$COMMITLINT_TO" --verbose

  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Run integration tests
        run: npm run test:integration

  build:
    name: Build · ${{ matrix.os }}
    needs: [lint-and-typecheck]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Verify CSS build output
        if: matrix.os == 'ubuntu-latest'
        run: |
          node -e "
            const fs = require('fs'), path = require('path');
            const dir = 'out/renderer/assets';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.css'));
            if (!files.length) { console.error('No CSS files found in ' + dir); process.exit(1); }
            const css = files.map(f => fs.readFileSync(path.join(dir, f), 'utf-8')).join('');
            const size = Buffer.byteLength(css);
            console.log('CSS output size:', size, 'bytes');
            if (size < 20000) {
              console.error('CSS is too small (' + size + ' bytes) — Tailwind utilities are likely not being generated');
              process.exit(1);
            }
            if (!css.includes('th-surface')) {
              console.error('Custom Tailwind theme colors missing from CSS — tailwind.config.js may not be loaded');
              process.exit(1);
            }
            console.log('CSS output OK');
          "

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-${{ matrix.os }}
          path: out/
          retention-days: 3
