# Release
#
# Triggered automatically when release-please merges its Release PR and creates
# a GitHub release (see .github/workflows/version.yml).  Runs CI then builds
# and publishes the cross-platform Electron binaries as release assets.
#
# To release manually (e.g. a hotfix), publish a GitHub release with a tag that
# matches the version in package.json (e.g. v0.2.2) — this workflow will fire
# in the same way.

name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  ci:
    name: CI · Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  build:
    needs: [ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            label: Windows
          - os: macos-latest
            platform: mac
            label: macOS
          - os: ubuntu-latest
            platform: linux
            label: Linux

    name: Build · ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      # Linux arm64 cross-compilation requires additional tools
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            rpm \
            fakeroot \
            dpkg

      - name: Install dependencies
        run: npm ci

      - name: Build (electron-vite)
        run: npm run build

      - name: Package and publish
        env:
          # electron-builder uses GH_TOKEN to upload assets to the release
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing — set CSC_LINK / CSC_KEY_PASSWORD for signed builds
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --${{ matrix.platform }} --publish always
