name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            label: Windows
          - os: macos-latest
            platform: mac
            label: macOS
          - os: ubuntu-latest
            platform: linux
            label: Linux

    name: Build · ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            rpm \
            fakeroot \
            dpkg

      - name: Install dependencies
        run: npm ci

      - name: Build (electron-vite)
        run: npm run build

      - name: Package and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable macOS keychain auto-discovery (no Apple cert configured)
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Windows code signing — set WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD
          # to enable Authenticode signing and remove the SmartScreen warning.
          # Options:
          #   Azure Trusted Signing (~$9.99/mo): use @electron/windows-sign
          #     with AZURE_KEY_VAULT_* environment variables
          #   EV/OV certificate: set WIN_CSC_LINK to base64-encoded .pfx
          #     and WIN_CSC_KEY_PASSWORD to the certificate password
        run: npx electron-builder --${{ matrix.platform }} --publish always
