name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: '0 8 * * 1'

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: npm audit (high + critical only)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Install audit-ci
        run: npm install -g audit-ci

      - name: audit-ci (fail on critical)
        run: audit-ci --critical

  electron-security-lint:
    name: Electron Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install electronegativity
        run: npm install -g @doyensec/electronegativity

      - name: Run Electronegativity
        run: electronegativity -i . -o electronegativity-report.sarif -f sarif || true

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
        with:
          sarif_file: electronegativity-report.sarif
        continue-on-error: true
