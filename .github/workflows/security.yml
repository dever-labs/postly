name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: '0 8 * * 1'

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: npm audit (production, fail on high+)
        run: npm audit --omit=dev --audit-level=high

      - name: npm audit (all deps, informational)
        run: npm audit || true


  electron-security-lint:
    name: Electron Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install electronegativity
        run: npm install -g @doyensec/electronegativity

      - name: Run Electronegativity
        run: electronegativity -i . || true
