name: Security

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: '0 8 * * 1'

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: npm audit (production, fail on high+)
        run: npm audit --omit=dev --audit-level=high

      - name: npm audit (all deps, informational)
        run: npm audit || true


  electron-security-lint:
    name: Electron Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install electronegativity
        run: npm install -g @doyensec/electronegativity

      - name: Run Electronegativity
        run: electronegativity -i . || true
