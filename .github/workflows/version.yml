# Versioning
#
# Runs release-please on every push to main. It analyses conventional commits
# since the last release and either creates or updates a "Release PR":
#
#   Commit prefix  → version bump
#   ─────────────────────────────
#   fix:           → patch  (0.2.1 → 0.2.2)
#   feat:          → minor  (0.2.1 → 0.3.0)
#   feat!: / BREAKING CHANGE: → major (0.2.1 → 1.0.0)
#
# When the Release PR is merged release-please:
#   1. Bumps package.json version
#   2. Updates CHANGELOG.md
#   3. Creates a GitHub release and tag (e.g. v0.3.0)
#
# The `release: published` trigger in release.yml then kicks off the
# cross-platform Electron build and publishes the binary assets.

name: Versioning

on:
  push:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
