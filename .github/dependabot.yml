version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      electron:
        patterns:
          - "electron*"
          - "@electron*"
      react:
        patterns:
          - "react*"
          - "@types/react*"
      radix:
        patterns:
          - "@radix-ui/*"
      dev-tools:
        dependency-type: "development"
    ignore:
      # Pin Electron major version intentionally
      - dependency-name: "electron"
        update-types: ["version-update:semver-major"]
